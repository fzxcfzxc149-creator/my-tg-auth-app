<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Диагностика Mini App</title>
</head>
<body>
    <h3>Диагностика авторизации</h3>
    <div id="status">Загрузка...</div>

    <script>
        const statusDiv = document.getElementById('status');

        // Проверяем, доступен ли Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const initData = tg.initData;

            if (initData) {
                statusDiv.innerHTML = '<p style="color:green">✅ initData получена! Длина: ' + initData.length + ' символов.</p>' +
                                      '<p>Первые 50 символов: ' + initData.substring(0, 50) + '...</p>';
                // Здесь позже будем отправлять на сервер
            } else {
                statusDiv.innerHTML = '<p style="color:red">❌ initData пуста. Убедитесь, что вы открыли страницу через кнопку в боте, а не просто по ссылке.</p>';
            }
        } else {
            statusDiv.innerHTML = '<p style="color:red">❌ Telegram WebApp не доступен. Откройте страницу через Telegram.</p>';
        }
    </script>
</body>
</html>
