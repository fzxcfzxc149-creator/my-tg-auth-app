<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Авторизация для бота</title>
</head>
<body>
    <h3>Подождите, идёт авторизация...</h3>
    <p>Это окно закроется автоматически.</p>

    <script>
        if (window.Telegram?.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const initData = tg.initData;

            if (!initData) {
                document.body.innerHTML = '<p>Ошибка: не удалось получить данные от Telegram.</p>';
            } else {
                fetch('https://твой-сервер.com/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: initData })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        document.body.innerHTML = '<h3>✅ Успешно!</h3><p>Теперь можешь вернуться в чат с ботом и использовать /list.</p>';
                        tg.close();
                    } else {
                        document.body.innerHTML = '<h3>❌ Ошибка</h3><p>Не удалось подтвердить личность.</p>';
                    }
                })
                .catch(error => {
                    document.body.innerHTML = '<p>Ошибка соединения с сервером.</p>';
                    console.error(error);
                });
            }
        } else {
            document.body.innerHTML = '<p>Это приложение должно быть открыто через Telegram.</p>';
        }
    </script>
</body>
</html>
