<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Авторизация для бота</title>
</head>
<body>
    <h3>Подождите, идёт авторизация...</h3>
    <p>Это окно закроется автоматически.</p>

    <script>
        (function() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                document.body.innerHTML = '<p style="color:red">❌ Ошибка: запустите через Telegram.</p>';
                return;
            }

            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const initData = tg.initData;

            if (!initData) {
                document.body.innerHTML = '<p style="color:red">❌ Ошибка: нет данных от Telegram.</p>';
                return;
            }

            // ⬇️⬇️⬇️ ВОТ ЭТА СТРОКА — её нужно заменить на твой адрес ngrok ⬇️⬇️⬇️
            const serverUrl = 'https://kenny-interpenetrant-impalpably.ngrok-free.dev/verify';

            fetch(serverUrl, {
    method: 'POST',
    headers: { 
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true'   // ← добавляем эту строку
    },
    body: JSON.stringify({ initData: initData })
})
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    document.body.innerHTML = '<h3 style="color:green">✅ Успешно!</h3><p>Теперь можно вернуться в чат и использовать /list.</p>';
                    tg.close();
                } else {
                    document.body.innerHTML = '<h3 style="color:red">❌ Ошибка</h3><p>Не удалось подтвердить личность.</p>';
                }
            })
            .catch(error => {
                document.body.innerHTML = '<p style="color:red">❌ Ошибка соединения с сервером.</p>';
                console.error(error);
            });
        })();
    </script>
</body>
</html>
