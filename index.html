<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Диагностика Mini App</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        .good { color: green; font-weight: bold; }
        .bad { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Диагностика авторизации</h3>
    <div id="info">Загрузка...</div>

    <script>
        const infoDiv = document.getElementById('info');
        
        if (!window.Telegram || !window.Telegram.WebApp) {
            infoDiv.innerHTML = '<p class="bad">❌ Telegram WebApp не доступен. Откройте через кнопку в боте.</p>';
        } else {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const initData = tg.initData;

            if (!initData) {
                infoDiv.innerHTML = '<p class="bad">❌ initData пуста. Убедитесь, что вы открыли через кнопку в боте.</p>';
            } else {
                infoDiv.innerHTML = '<p class="good">✅ initData получена!</p>' +
                                   '<p>Длина: ' + initData.length + ' символов.</p>';
                // Покажем первые 50 символов для проверки
                infoDiv.innerHTML += '<p>Начало: <code>' + initData.substring(0, 50) + '...</code></p>';
                
                // Попробуем извлечь имя пользователя
                try {
                    const params = new URLSearchParams(initData);
                    const userStr = params.get('user');
                    if (userStr) {
                        const user = JSON.parse(userStr);
                        infoDiv.innerHTML += '<p>👤 Привет, ' + user.first_name + '!</p>';
                    }
                } catch (e) {
                    // игнорируем
                }
                
                // Кнопка закрытия
                infoDiv.innerHTML += '<br><button onclick="Telegram.WebApp.close()">Закрыть</button>';
            }
        }
    </script>
</body>
</html>
